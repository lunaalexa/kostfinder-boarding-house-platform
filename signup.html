<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KostFinder – Sign Up</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="phone-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar-simple">
    <a href="index.html" class="navbar-brand">
      <span>🏠</span>KostFinder
    </a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <h2>Create Account</h2>
      <p class="auth-sub">Sign up to get started</p>

      <div class="form-group">
        <label for="signupName">Full Name</label>
        <input class="form-control" type="text" id="signupName" placeholder="Your Name" />
      </div>

      <div class="form-group">
        <label for="signupEmail">Email</label>
        <input class="form-control" type="email" id="signupEmail" placeholder="yourEmail@email.com" />
      </div>

      <div class="form-group">
        <label for="signupPass">Password</label>
        <input class="form-control" type="password" id="signupPass" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label for="signupConfirm">Confirm Password</label>
        <input class="form-control" type="password" id="signupConfirm" placeholder="••••••••" />
      </div>

      <div id="signupError" class="toast toast-error" style="display:none;margin-bottom:12px;"></div>

      <button class="btn btn-primary btn-block" id="signupBtn">Sign Up</button>

      <div class="auth-redirect" style="margin-top:20px;">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>

</div>

<script src="js/shared.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
