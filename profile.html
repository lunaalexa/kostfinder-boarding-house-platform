<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KostFinder – Profile</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>

<div class="phone-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">🏠</span>KostFinder
    </a>
    <div class="navbar-icons">
      <a href="comparison.html" title="Compare kosts">⊞</a>
      <a href="favorite.html" title="Favorites">♡</a>
    <div class="menu-container">
      <button id="menuBtn" class="menu-btn">☰</button>

      <div id="dropdownMenu" class="dropdown-menu">
        <a href="profile.html">My Profile</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>
  </div>
</nav>

  <!-- CONTENT -->
  <div class="page-content">

    <!-- PROFILE HEADER -->
    <div class="profile-header animate-in">
      <h2>Your Profile</h2>
      <div class="avatar-wrap">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80" alt="Avatar" id="avatarImg" />
        <button class="avatar-edit" title="Edit profile picture">✏️</button>
      </div>
      <div class="profile-username" id="profileUsername">
        MayraZhifa211
        <button title="Edit username">✏️</button>
      </div>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card animate-in">
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" type="text" id="profileName" placeholder="Full Name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" id="profileEmail" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="profilePass" placeholder="••••••••••••" />
      </div>
      <div class="form-group">
        <label>Contact</label>
        <input class="form-control" type="tel" id="profileContact" placeholder="+62…" />
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="profile-actions animate-in">
      <button class="btn btn-primary btn-block" id="saveBtn">Save Changes</button>
      <button class="btn btn-danger btn-block" id="logoutBtn">Logout</button>
    </div>

    <div id="profileToast" class="toast" style="margin:0 16px 16px;display:none;"></div>

  </div><!-- end page-content -->
</div>

<script src="js/shared.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
