<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Review</title>

  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/addReview.css">
</head>
<body>

<div class="phone-wrapper">

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">🏠</span>KostFinder
    </a>
  </nav>

  <div class="review-container">

    <a href="javascript:history.back()" class="back-link">
      ← Back
    </a>

    <h2 class="review-title">Add Review</h2>

    <p class="review-subtitle">
      Share your experience with this kost.
    </p>

    <div class="review-form">

      <div class="form-group">
        <label>Rating</label>

        <select id="rating" class="rating-select">
          <option value="">Select Rating</option>
          <option value="5">★★★★★ (5)</option>
          <option value="4">★★★★☆ (4)</option>
          <option value="3">★★★☆☆ (3)</option>
          <option value="2">★★☆☆☆ (2)</option>
          <option value="1">★☆☆☆☆ (1)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Review</label>

        <textarea
          id="review"
          class="form-control"
          placeholder="Write your review..."
        ></textarea>

        <div class="char-counter">
          Max 300 characters
        </div>
      </div>

      <button
        id="submitReview"
        class="submit-review-btn">
        Submit Review
      </button>

    </div>

  </div>

</div>

<script src="js/addReview.js"></script>

</body>
</html>
