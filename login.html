<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KostFinder – Log In</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="phone-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar-simple">
    <a href="index.html" class="navbar-brand">
      <span>🏠</span>KostFinder
    </a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <h2>Welcome Back</h2>
      <p class="auth-sub">Log in to your account</p>

      <!-- TOAST (shown after success) -->
      <div class="toast toast-success" id="loginToast" style="display:none;">
        Account Created! Redirecting…
      </div>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input class="form-control" type="email" id="loginEmail" placeholder="yourEmail@email.com" />
      </div>

      <div class="form-group">
        <label for="loginPass">Password</label>
        <input class="form-control" type="password" id="loginPass" placeholder="••••••••" />
      </div>

      <div id="loginError" class="toast toast-error" style="display:none;margin-bottom:12px;"></div>

      <button class="btn btn-primary btn-block" id="loginBtn">Log In</button>

      <div class="auth-divider">Don't have an account yet?</div>

      <a href="signup.html" class="auth-link-btn">Sign Up</a>

    </div>
  </div>

</div>

<script src="js/shared.js"></script>
<script src="js/login.js"></script>
</body>
</html>
